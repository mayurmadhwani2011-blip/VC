services:
  - type: web
    name: friend-savings-bank
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    autoDeploy: true
    disks:
      - name: app-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_SECRET
        generateValue: true
      - key: GOLD_API_KEY
        sync: false
