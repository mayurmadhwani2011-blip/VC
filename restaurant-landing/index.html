<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Connect with Dunia Al Bukhari - social links, contact info, and updates." />
  <title>Dunia Al Bukhari | Connect With Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow" aria-hidden="true"></div>

  <main class="card">
    <nav class="language-switch" aria-label="Language selector">
      <button type="button" class="lang-btn is-active" data-lang="en">English</button>
      <button type="button" class="lang-btn" data-lang="ar">العربية</button>
    </nav>

    <header class="hero">
      <img class="logo" src="assets/logo.png" alt="Restaurant logo" />
      <h1 data-i18n="brandName">Dunia Al Bukhari</h1>
      <p data-i18n="tagline">Fresh flavors, warm ambiance, and memorable evenings.</p>
    </header>

    <section class="links" aria-label="Social media links" data-i18n-aria-label="socialRegion">
      <a class="social-link" href="https://instagram.com/" target="_blank" rel="noopener noreferrer">
        <span data-i18n="instagram">Instagram</span>
        <small>@duniaalbukhari</small>
      </a>
      <a class="social-link" href="https://facebook.com/" target="_blank" rel="noopener noreferrer">
        <span data-i18n="facebook">Facebook</span>
        <small>/duniaalbukhari</small>
      </a>
      <a class="social-link" href="https://wa.me/919999999999" target="_blank" rel="noopener noreferrer">
        <span data-i18n="whatsapp">WhatsApp</span>
        <small data-i18n="whatsappSub">Chat with us</small>
      </a>
      <a class="social-link" href="https://youtube.com/" target="_blank" rel="noopener noreferrer">
        <span data-i18n="youtube">YouTube</span>
        <small data-i18n="youtubeSub">Dunia Al Bukhari Kitchen</small>
      </a>
      <a class="social-link" href="https://maps.google.com/" target="_blank" rel="noopener noreferrer">
        <span data-i18n="location">Location</span>
        <small data-i18n="locationSub">Get directions</small>
      </a>
    </section>

    <footer class="details">
      <p data-i18n="hours">Open daily: 12:00 PM - 11:00 PM</p>
      <p data-i18n="phone">Call: +91 99999 99999</p>
      <p data-i18n="address">123 Flavor Street, Your City</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
