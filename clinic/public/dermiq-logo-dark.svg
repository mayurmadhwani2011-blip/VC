<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F4C75"/>
      <stop offset="100%" stop-color="#0A7EA4"/>
    </linearGradient>
  </defs>

  <!-- Dark bg -->
  <rect x="0" y="0" width="300" height="80" rx="12" fill="#050D1A"/>

  <!-- Icon background: clinical rounded square -->
  <rect x="8" y="8" width="60" height="60" rx="10" fill="url(#bg)"/>

  <!-- Skin layer lines -->
  <rect x="18" y="20" width="40" height="5" rx="2.5" fill="white" opacity="0.95"/>
  <rect x="18" y="31" width="40" height="9" rx="2.5" fill="white" opacity="0.6"/>
  <rect x="18" y="46" width="40" height="12" rx="2.5" fill="white" opacity="0.25"/>

  <!-- Small cross accent top-right -->
  <rect x="54" y="11" width="2" height="8" rx="1" fill="#5EEAD4"/>
  <rect x="51" y="14" width="8" height="2" rx="1" fill="#5EEAD4"/>

  <!-- Wordmark -->
  <text x="84" y="38"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="28" font-weight="300" fill="#E2E8F0" letter-spacing="1">DERM</text>
  <text x="180" y="38"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="28" font-weight="700" fill="#5EEAD4" letter-spacing="1">IQ</text>

  <!-- Divider -->
  <line x1="84" y1="46" x2="238" y2="46" stroke="#1E3A5F" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="84" y="60"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="9" font-weight="600" fill="#475569" letter-spacing="2.8">DERMATOLOGY MANAGEMENT</text>
</svg>
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hclip">
      <polygon points="44,3 75,21 75,57 44,75 13,57 13,21"/>
    </clipPath>
  </defs>

  <!-- Dark pill background -->
  <rect x="0" y="0" width="310" height="88" rx="14" fill="#0D0B1A"/>

  <!-- Glow shadow behind hex -->
  <polygon points="44,3 75,21 75,57 44,75 13,57 13,21" fill="#9333EA" opacity="0.35" filter="url(#glow)" transform="translate(0,3)"/>

  <!-- Hexagon background -->
  <polygon points="44,3 75,21 75,57 44,75 13,57 13,21" fill="url(#hg)"/>

  <!-- Fingerprint loop arcs (skin ridges), clipped to hex -->
  <g clip-path="url(#hclip)" fill="none" stroke="white" stroke-linecap="round">
    <path d="M 38,60 C 38,52 50,52 50,60" stroke-width="2" opacity="0.55"/>
    <path d="M 33,60 C 33,46 55,46 55,60" stroke-width="2" opacity="0.62"/>
    <path d="M 28,60 C 28,40 60,40 60,60" stroke-width="2" opacity="0.68"/>
    <path d="M 23,60 C 23,34 65,34 65,60" stroke-width="2" opacity="0.73"/>
    <path d="M 18,60 C 18,28 70,28 70,60" stroke-width="2" opacity="0.78"/>
    <path d="M 13,60 C 13,22 75,22 75,60" stroke-width="2" opacity="0.82"/>
    <path d="M  8,60 C  8,16 80,16 80,60" stroke-width="2" opacity="0.86"/>
    <path d="M  3,60 C  3,10 85,10 85,60" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Center delta dot -->
  <circle cx="44" cy="61" r="3" fill="white" opacity="0.95"/>

  <!-- Wordmark: derm -->
  <text x="92" y="49"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="33" font-weight="600" fill="white" letter-spacing="-0.5">derm</text>

  <!-- Wordmark: iq in gradient -->
  <text x="202" y="49"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="33" font-weight="800" fill="url(#wg)" letter-spacing="-0.5">iq</text>

  <!-- Tagline -->
  <text x="93" y="66"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="9.5" font-weight="500" fill="#6B7280" letter-spacing="3.2">DERMATOLOGY SUITE</text>

  <!-- Accent underline -->
  <line x1="93" y1="73" x2="248" y2="73" stroke="url(#wg)" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
</svg>
